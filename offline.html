<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mockup paiement e-EUR hors ligne</title>
  <style>
    :root { color-scheme: light; --ink:#172033; --muted:#667085; --line:#d9e2ec; --panel:#fff; --brand:#007781; --brand-dark:#03515a; --blue:#173f8a; --ok:#12805c; --wait:#a15c07; --shadow:0 22px 60px rgba(13,35,58,.16); font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; background:linear-gradient(135deg,#08777f,#163f86); color:var(--ink); }
    button { font:inherit; }
    main { width:min(1120px,calc(100% - 32px)); margin:0 auto; padding:28px 0 34px; }
    header { display:grid; grid-template-columns:1fr auto; gap:18px; align-items:end; margin-bottom:18px; color:#fff; }
    h1 { margin:0; font-size:clamp(30px,4vw,48px); line-height:1.04; letter-spacing:0; }
    .lede { max-width:760px; margin:10px 0 0; color:rgba(255,255,255,.86); font-size:16px; line-height:1.5; }
    .nav-button { display:inline-flex; align-items:center; justify-content:center; min-height:40px; padding:8px 14px; border:1px solid rgba(255,255,255,.36); border-radius:8px; background:rgba(255,255,255,.14); color:#fff; text-decoration:none; font-weight:900; }
    .support-switch { display:inline-grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:12px; padding:6px; border:1px solid rgba(255,255,255,.36); border-radius:8px; background:rgba(255,255,255,.14); }
    .support-switch button { min-height:38px; min-width:132px; padding:8px 12px; border:0; border-radius:7px; background:transparent; color:rgba(255,255,255,.82); cursor:pointer; font-weight:900; }
    .support-switch button.active { background:#fff; color:var(--brand-dark); }
    .workspace { display:grid; grid-template-columns:1fr 1fr; gap:18px; align-items:start; }
    .device { overflow:hidden; border:1px solid rgba(255,255,255,.28); border-radius:8px; background:var(--panel); box-shadow:var(--shadow); }
    .device-top { display:flex; justify-content:space-between; gap:10px; padding:13px 16px; border-bottom:1px solid var(--line); color:var(--muted); font-size:12px; font-weight:900; text-transform:uppercase; }
    .screen { min-height:660px; padding:18px; background:linear-gradient(#fff,#f8fbfd); }
    .label { margin-bottom:6px; color:var(--muted); font-size:11px; font-weight:900; letter-spacing:.08em; text-transform:uppercase; }
    .wallet-card { padding:16px; border-radius:8px; background:#102033; color:#fff; }
    .wallet-card .label { color:rgba(255,255,255,.64); }
    .amount { margin:4px 0 12px; color:var(--brand-dark); font-size:clamp(40px,6vw,58px); font-weight:900; letter-spacing:0; }
    .wallet-card .amount { color:#fff; }
    .merchant-total { padding:18px; border-radius:8px; background:#f5fbfb; border:1px solid #cbe4e7; }
    .brand-logo { display:inline-grid; place-items:center; width:fit-content; min-height:34px; margin-bottom:10px; padding:6px 12px; border-radius:6px; font-weight:950; letter-spacing:0; line-height:1; }
    .brand-logo.transavia { background:#00a86b; color:#fff; font-size:17px; }
    .brand-logo.transavia::first-letter { color:#d9f000; }
    .status { display:flex; align-items:center; min-height:46px; margin:14px 0; padding:11px 13px; border-radius:8px; background:#e8f7f1; color:var(--ok); font-weight:900; }
    .status.waiting { background:#fff7e6; color:var(--wait); }
    .status.neutral { background:#edf4ff; color:var(--blue); }
    .eu-star-loader { position:relative; flex:0 0 auto; width:28px; height:28px; margin-right:10px; animation:spinStars 1.4s linear infinite; }
    .eu-star-loader span { position:absolute; left:50%; top:50%; color:#f5c542; font-size:8px; line-height:1; transform:rotate(calc(var(--i) * 30deg)) translateY(-11px); transform-origin:0 0; }
    .eu-star-loader.large { width:86px; height:86px; margin:0 auto 16px; }
    .eu-star-loader.large span { font-size:17px; transform:rotate(calc(var(--i) * 30deg)) translateY(-36px); }
    @keyframes spinStars { to { transform:rotate(360deg); } }
    .settlement-panel { display:grid; place-items:center; min-height:238px; margin:14px 0; padding:24px; border:1px solid #cfe0ff; border-radius:8px; background:linear-gradient(135deg,#f6f9ff,#edf4ff); text-align:center; }
    .settlement-panel strong { display:block; color:var(--blue); font-size:18px; margin-bottom:6px; }
    .settlement-panel p { max-width:320px; margin:0; color:#455468; line-height:1.4; }
    .offline-visual { display:grid; place-items:center; min-height:238px; margin:14px 0; padding:18px; border:1px solid var(--line); border-radius:8px; background:linear-gradient(135deg,#f7fbff,#fff); text-align:center; }
    .smart-card { position:relative; width:min(100%,280px); aspect-ratio:1.58; border-radius:14px; background:linear-gradient(135deg,#102033,#173f8a); color:#fff; box-shadow:0 18px 34px rgba(16,32,51,.2); padding:18px; text-align:left; }
    .chip { width:48px; height:36px; border-radius:7px; background:linear-gradient(135deg,#f4c96b,#b88617); margin-bottom:22px; }
    .phone { display:grid; place-items:center; width:142px; height:238px; margin:0 auto; border:10px solid #102033; border-radius:28px; background:linear-gradient(160deg,#eaf7f8,#fff); color:var(--brand-dark); box-shadow:0 18px 34px rgba(16,32,51,.2); font-weight:950; }
    .phone span { display:block; margin-top:8px; color:#455468; font-size:12px; font-weight:800; }
    .smart-card strong { display:block; font-size:18px; }
    .smart-card span { display:block; margin-top:8px; color:rgba(255,255,255,.72); font-size:13px; font-weight:800; }
    .tap-symbol { margin-top:12px; color:var(--brand-dark); font-weight:900; }
    .card { margin-top:12px; padding:14px; border:1px solid var(--line); border-radius:8px; background:#fff; }
    .card strong { display:block; margin-bottom:5px; font-size:15px; }
    .card p { margin:0; color:#455468; line-height:1.45; }
    .offline-sync { display:grid; grid-template-columns:1fr auto; gap:12px; align-items:center; margin-top:12px; padding:13px 14px; border:1px solid #f1d49b; border-radius:8px; background:#fff8ea; }
    .offline-sync span { color:#8a5a13; font-size:12px; font-weight:800; text-transform:uppercase; }
    .offline-sync strong { display:block; color:#7a4300; font-size:14px; }
    .offline-sync em { display:block; margin-top:3px; color:#946113; font-size:12px; font-style:normal; font-weight:700; }
    .offline-amount { color:#7a4300; font-size:22px; font-weight:950; text-align:right; white-space:nowrap; }
    .clear-offline { grid-column:1 / -1; min-height:38px; border:1px solid #d99b3d; border-radius:8px; background:#fff; color:#7a4300; cursor:pointer; font-weight:900; }
    .clear-offline:disabled { border-color:#ead9bd; color:#b69462; cursor:not-allowed; opacity:.7; }
    .ticket { display:grid; gap:9px; margin-top:14px; padding:14px; border:1px dashed #9aa8b7; border-radius:8px; background:#fff; font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; font-size:13px; color:#344054; }
    .ticket-row { display:flex; justify-content:space-between; gap:12px; }
    .actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px; }
    .primary,.secondary { min-height:46px; border-radius:8px; cursor:pointer; font-weight:900; }
    .primary { border:0; background:var(--brand); color:#fff; }
    .secondary { border:1px solid var(--line); background:#fff; color:var(--brand-dark); }
    @media (max-width:900px) { header,.workspace { grid-template-columns:1fr; } .support-switch { width:100%; } .support-switch button { min-width:0; } .screen { min-height:auto; } .actions { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Paiement hors ligne</h1>
        <p class="lede">Simulation e-EUR sans QR code : le client présente un téléphone NFC ou une smart card au TPE, puis la vente est synchronisée plus tard.</p>
        <div class="support-switch" aria-label="Support de paiement hors ligne">
          <button class="active" type="button" data-support="phone">Téléphone NFC</button>
          <button type="button" data-support="card">Smart card</button>
        </div>
      </div>
      <a class="nav-button" href="index.html">Mode connecté</a>
    </header>
    <section class="workspace" aria-label="Mockup paiement euro numérique hors ligne">
      <article class="device" aria-label="Écran client"><div class="device-top"><span>Client</span><span id="clientSupportLabel">Téléphone NFC</span></div><div class="screen" id="clientScreen"></div></article>
      <article class="device" aria-label="Écran commerçant"><div class="device-top"><span>Commerçant</span><span>TPE offline</span></div><div class="screen" id="merchantScreen"></div></article>
    </section>
  </main>
  <script>
    const sales = [
      { merchant:"Transavia", amount:65.00, label:"Achat Transavia", article:"Duty free - Parfum Miss Dior", reference:"OFF-EUR-240426-01", alias:"MRC-8F3A-214C" },
      { merchant:"Transavia", amount:8.90, label:"Achat Transavia", article:"Sandwich Poulet Mexicain", reference:"OFF-EUR-240426-02", alias:"MRC-8F3A-214C" },
      { merchant:"Transavia", amount:3.50, label:"Achat Transavia", article:"Cookie Chocolat Noisettes", reference:"OFF-EUR-240426-03", alias:"MRC-8F3A-214C" }
    ];
    const offlinePending = { count:0, amount:0 };
    let walletSpent = 0;
    const supports = {
      phone: { label:"Téléphone NFC", short:"téléphone", reserve:"Réserve e-EUR mobile", balance:184.20, title:"Paiement NFC hors ligne", intro:"Le téléphone contient une réserve e-EUR prête à payer hors ligne.", progress:"Paiement en cours de validation.", ticket:"Ticket téléphone NFC", rail:"e-EUR hors ligne / NFC" },
      card: { label:"Smart card", short:"smart card", reserve:"Réserve e-EUR smart card", balance:184.20, title:"Paiement par smart card", intro:"La carte contient une réserve e-EUR prête à payer hors ligne.", progress:"Paiement en cours de validation.", ticket:"Ticket smart card", rail:"e-EUR hors ligne / smart card" }
    };
    const flowBase = [
      { clientStatus:"Présenter le support au TPE", merchantStatus:"Mode hors ligne actif", merchantTitle:"Attente support", merchantText:"Aucune connexion réseau nécessaire pour accepter le paiement.", visual:true },
      { clientStatus:"Validation du paiement", merchantStatus:"Validation en cours", title:"Paiement en cours", merchantTitle:"Contrôle hors ligne", merchantText:"Le paiement est contrôlé localement, sans connexion réseau." },
      { clientStatus:"Paiement accepté", merchantStatus:"Accepté - synchro en attente", merchantTitle:"Vente acceptée localement", merchantText:"La vente est ajoutée aux paiements hors ligne et sera transmise à la reconnexion.", accepted:true }
    ];
    let step = 0;
    let support = "phone";
    let saleIndex = 0;
    let acceptedQueued = false;
    const clientScreen = document.querySelector("#clientScreen");
    const merchantScreen = document.querySelector("#merchantScreen");
    const clientSupportLabel = document.querySelector("#clientSupportLabel");
    const money = value => value.toLocaleString("fr-FR", { style:"currency", currency:"EUR" });
    const current = () => flowBase[step];
    const currentSale = () => sales[saleIndex];
    const currentSupport = () => supports[support];
    const statusClass = state => state.accepted ? "status" : step === 1 ? "status neutral" : "status waiting";

    function starRing(size = "") {
      const stars = Array.from({ length: 12 }, (_, index) => `<span style="--i:${index}">★</span>`).join("");
      return `<span class="eu-star-loader ${size}" aria-hidden="true">${stars}</span>`;
    }

    function statusContent(text) {
      if (step !== 1) return text;
      return `${starRing()}<span>${text}</span>`;
    }

    function offlineSettlementVisual() {
      if (step !== 1) return "";
      return `
        <div class="settlement-panel" aria-label="Validation du paiement en cours">
          ${starRing("large")}
          <strong>Validation en cours</strong>
          <p>Le paiement est vérifié sans connexion réseau.</p>
        </div>
      `;
    }

    function offlineVisual() {
      const s = currentSupport();
      if (support === "phone") {
        return `<div class="offline-visual"><div><div class="phone">NFC<span>Secure Element</span></div><div class="tap-symbol">Approcher du TPE</div></div></div>`;
      }
      return `<div class="offline-visual"><div><div class="smart-card"><div class="chip"></div><strong>Smart card e-EUR</strong><span>Solde offline disponible : ${money(s.balance)}</span></div><div class="tap-symbol">Présenter au TPE</div></div></div>`;
    }

    function brandLogo() { return `<div class="brand-logo transavia" aria-label="Logo Transavia">transavia</div>`; }

    function renderClient() {
      const state = current();
      const s = currentSupport();
      const sale = currentSale();
      const balance = s.balance - walletSpent;
      const title = state.title || s.title;
      const text = state.accepted ? `${sale.label} - ${money(sale.amount)}` : state.text || (step === 0 ? s.intro : s.progress);
      clientScreen.innerHTML = `
        <div class="wallet-card"><div class="label">${s.reserve}</div><div class="amount">${money(balance)}</div><div>Support : ${s.label}</div></div>
        <div class="${statusClass(state)}">${statusContent(state.clientStatus)}</div>
        ${state.visual ? offlineVisual() : ""}
        ${offlineSettlementVisual()}
        <div class="card"><strong>${state.accepted ? s.ticket : title}</strong><p>${text}</p></div>
        <div class="actions"><button class="secondary" type="button" data-action="back">Retour</button><button class="primary" type="button" data-action="next">${state.accepted ? "Nouvelle vente" : "Continuer"}</button></div>
      `;
    }

    function renderMerchant() {
      const state = current();
      const s = currentSupport();
      const sale = currentSale();
      merchantScreen.innerHTML = `
        <div class="merchant-total">${brandLogo()}<div class="label">Montant</div><div class="amount">${money(sale.amount)}</div><strong>${sale.label}</strong></div>
        <div class="offline-sync" aria-label="Ventes offline en attente de synchronisation"><div><span>File offline TPE</span><strong>${offlinePending.count} vente${offlinePending.count > 1 ? "s" : ""} à synchroniser</strong><em>${offlinePending.count === 0 ? "File vidée" : state.accepted ? "Paiement ajouté à la file locale" : "Connexion réseau indisponible"}</em></div><div class="offline-amount">${money(offlinePending.amount)}</div><button class="clear-offline" type="button" data-action="clear-offline" ${offlinePending.count === 0 ? "disabled" : ""}>Vider les transactions offline</button></div>
        <div class="${statusClass(state)}">${statusContent(state.merchantStatus)}</div>
        ${state.visual ? offlineVisual() : ""}
        ${offlineSettlementVisual()}
        <div class="card"><strong>${state.merchantTitle}</strong><p>${state.merchantText}</p></div>
        <div class="ticket" aria-label="Ticket commerçant"><div class="ticket-row"><span>Marchand</span><strong>${sale.merchant}</strong></div><div class="ticket-row"><span>Article</span><strong>${sale.article}</strong></div><div class="ticket-row"><span>Montant</span><strong>${money(sale.amount)}</strong></div><div class="ticket-row"><span>Rail</span><strong>${s.rail}</strong></div><div class="ticket-row"><span>Statut</span><strong>${state.accepted ? "ACCEPTÉ LOCAL" : "EN COURS"}</strong></div><div class="ticket-row"><span>Ref.</span><strong>${sale.reference}</strong></div></div>
        <div class="actions"><button class="secondary" type="button" data-action="back">Retour</button><button class="primary" type="button" data-action="next">${state.accepted ? "Nouvelle vente" : "Continuer"}</button></div>
      `;
    }

    function renderSupportButtons() {
      document.querySelectorAll("[data-support]").forEach(button => button.classList.toggle("active", button.dataset.support === support));
      clientSupportLabel.textContent = currentSupport().label;
    }
    function render() { renderSupportButtons(); renderClient(); renderMerchant(); }
    function queueAcceptedPayment() {
      if (acceptedQueued) return;
      const sale = currentSale();
      offlinePending.count += 1;
      offlinePending.amount += sale.amount;
      walletSpent += sale.amount;
      acceptedQueued = true;
    }
    function resetSaleFlow() {
      step = 0;
      acceptedQueued = false;
    }
    function advanceSale() {
      saleIndex = (saleIndex + 1) % sales.length;
    }
    function next() {
      if (step === flowBase.length - 1) {
        advanceSale();
        resetSaleFlow();
      } else {
        step += 1;
        if (flowBase[step].accepted) queueAcceptedPayment();
      }
      render();
    }
    function back() { step = Math.max(0, step - 1); render(); }
    function setSupport(nextSupport) { support = nextSupport; resetSaleFlow(); render(); }
    function clearOfflineTransactions() { offlinePending.count = 0; offlinePending.amount = 0; render(); }
    document.addEventListener("click", event => {
      const supportButton = event.target.closest("[data-support]");
      if (supportButton) setSupport(supportButton.dataset.support);
      const action = event.target.closest("[data-action]")?.dataset.action;
      if (action === "next") next();
      if (action === "back") back();
      if (action === "clear-offline") clearOfflineTransactions();
    });
    render();
  </script>
</body>
</html>
