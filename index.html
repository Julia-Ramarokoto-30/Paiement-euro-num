<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Projet PIE - EM grenoble - Mockup Euronumérique</title>
  <meta property="og:title" content="Projet PIE - EM grenoble - Mockup Euronumérique">
  <meta name="twitter:title" content="Projet PIE - EM grenoble - Mockup Euronumérique">
  <style>
    :root {
      color-scheme: light;
      --ink: #172033;
      --muted: #667085;
      --line: #d9e2ec;
      --panel: #ffffff;
      --soft: #f4f7fb;
      --brand: #007781;
      --brand-dark: #03515a;
      --blue: #173f8a;
      --ok: #12805c;
      --wait: #a15c07;
      --shadow: 0 22px 60px rgba(13, 35, 58, 0.16);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #08777f, #163f86);
      color: var(--ink);
    }

    button { font: inherit; }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 34px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: end;
      margin-bottom: 18px;
      color: #fff;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 4vw, 48px);
      line-height: 1.04;
      letter-spacing: 0;
    }

    .project-kicker {
      width: fit-content;
      margin-bottom: 10px;
      padding: 4px 7px;
      border: 1px solid rgba(255,255,255,.28);
      border-radius: 6px;
      color: rgba(255,255,255,.78);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .lede {
      max-width: 760px;
      margin: 10px 0 0;
      color: rgba(255,255,255,.86);
      font-size: 16px;
      line-height: 1.5;
    }

    .mode-switch {
      display: inline-grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      padding: 6px;
      border: 1px solid rgba(255,255,255,.36);
      border-radius: 8px;
      background: rgba(255,255,255,.14);
    }

    .mode-switch button {
      min-height: 40px;
      min-width: 132px;
      padding: 8px 14px;
      border: 0;
      border-radius: 7px;
      background: transparent;
      color: rgba(255,255,255,.82);
      cursor: pointer;
      font-weight: 900;
    }

    .mode-switch button.active {
      background: #fff;
      color: var(--brand-dark);
    }

    .offline-link {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      margin-top: 8px;
      border: 1px solid rgba(255,255,255,.36);
      border-radius: 8px;
      color: #fff;
      text-decoration: none;
      font-size: 13px;
      font-weight: 900;
      background: rgba(255,255,255,.12);
    }

    .workspace {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      align-items: start;
    }

    .device {
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.28);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .device-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 13px 16px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .screen {
      min-height: 660px;
      padding: 18px;
      background: linear-gradient(#fff, #f8fbfd);
    }

    .label {
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .wallet-card {
      padding: 16px;
      border-radius: 8px;
      background: #102033;
      color: #fff;
    }

    .wallet-card .label { color: rgba(255,255,255,.64); }

    .wallet-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      margin-top: 14px;
      padding: 8px 13px;
      border: 1px solid rgba(255,255,255,.36);
      border-radius: 8px;
      background: rgba(255,255,255,.12);
      color: #fff;
      text-decoration: none;
      font-size: 13px;
      font-weight: 900;
    }

    .amount {
      margin: 4px 0 12px;
      color: var(--brand-dark);
      font-size: clamp(40px, 6vw, 58px);
      font-weight: 900;
      letter-spacing: 0;
    }

    .wallet-card .amount { color: #fff; }

    .status {
      display: flex;
      align-items: center;
      min-height: 46px;
      margin: 14px 0;
      padding: 11px 13px;
      border-radius: 8px;
      background: #e8f7f1;
      color: var(--ok);
      font-weight: 900;
    }

    .eu-star-loader {
      position: relative;
      flex: 0 0 auto;
      width: 28px;
      height: 28px;
      margin-right: 10px;
      animation: spinStars 1.4s linear infinite;
    }

    .eu-star-loader span {
      position: absolute;
      left: 50%;
      top: 50%;
      color: #f5c542;
      font-size: 8px;
      line-height: 1;
      transform: rotate(calc(var(--i) * 30deg)) translateY(-11px);
      transform-origin: 0 0;
    }

    .eu-star-loader.large {
      width: 86px;
      height: 86px;
      margin: 0 auto 16px;
    }

    .eu-star-loader.large span {
      font-size: 17px;
      transform: rotate(calc(var(--i) * 30deg)) translateY(-36px);
    }

    @keyframes spinStars {
      to { transform: rotate(360deg); }
    }

    .settlement-panel {
      display: grid;
      place-items: center;
      min-height: 238px;
      margin: 14px 0;
      padding: 24px;
      border: 1px solid #cfe0ff;
      border-radius: 8px;
      background: linear-gradient(135deg, #f6f9ff, #edf4ff);
      text-align: center;
    }

    .settlement-panel strong {
      display: block;
      color: var(--blue);
      font-size: 18px;
      margin-bottom: 6px;
    }

    .settlement-panel p {
      max-width: 320px;
      margin: 0;
      color: #455468;
      line-height: 1.4;
    }


    .status.waiting { background: #fff7e6; color: var(--wait); }
    .status.neutral { background: #edf4ff; color: var(--blue); }
    .status.refused { background: #fff1f3; color: #b42318; }

    .card {
      margin-top: 12px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .card strong {
      display: block;
      margin-bottom: 5px;
      font-size: 15px;
    }

    .card p {
      margin: 0;
      color: #455468;
      line-height: 1.45;
    }

    .qr-box {
      display: grid;
      place-items: center;
      margin: 14px 0;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .brand-logo {
      display: inline-grid;
      place-items: center;
      width: fit-content;
      min-height: 34px;
      margin-bottom: 10px;
      padding: 6px 12px;
      border-radius: 6px;
      font-weight: 950;
      letter-spacing: 0;
      line-height: 1;
    }

    .brand-logo.auchan {
      grid-auto-flow: column;
      gap: 7px;
      background: #fff;
      color: #e31b23;
      font-size: 20px;
      text-transform: none;
    }

    .auchan-bird {
      width: 34px;
      height: 26px;
    }

    .brand-logo.transavia {
      background: #00a86b;
      color: #fff;
      font-size: 17px;
    }

    .brand-logo.transavia::first-letter { color: #d9f000; }

    .qr-amount {
      margin-bottom: 12px;
      color: var(--brand-dark);
      font-size: 30px;
      font-weight: 950;
      line-height: 1;
    }

    .qr-box img {
      display: block;
      width: min(100%, 280px);
      aspect-ratio: 1;
      image-rendering: pixelated;
    }

    .qr-caption {
      margin-top: 9px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-align: center;
    }

    .nfc-visual {
      display: grid;
      place-items: center;
      min-height: 238px;
      margin: 14px 0;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(135deg, #edf8f9, #fff);
      text-align: center;
    }

    .nfc-symbol {
      display: grid;
      place-items: center;
      width: 116px;
      height: 116px;
      margin-bottom: 12px;
      border-radius: 50%;
      background: #102033;
      color: #fff;
      font-size: 34px;
      font-weight: 900;
    }

    .merchant-total {
      padding: 18px;
      border-radius: 8px;
      background: #f5fbfb;
      border: 1px solid #cbe4e7;
    }

    .ticket {
      display: grid;
      gap: 9px;
      margin-top: 14px;
      padding: 14px;
      border: 1px dashed #9aa8b7;
      border-radius: 8px;
      background: #fff;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      color: #344054;
    }

    .ticket-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .receipt-header {
      display: grid;
      gap: 6px;
      padding-bottom: 10px;
      border-bottom: 1px dashed #9aa8b7;
    }

    .receipt-header .brand-logo {
      margin-bottom: 0;
    }

    .receipt-header .brand-logo.auchan span {
      color: #e31b23;
      text-transform: none;
    }

    .receipt-header strong {
      color: var(--ink);
      font-size: 16px;
    }

    .receipt-header span {
      color: var(--brand-dark);
      font-weight: 950;
      text-transform: uppercase;
    }

    .receipt-total {
      margin-top: 4px;
      padding-top: 10px;
      border-top: 1px dashed #9aa8b7;
      font-weight: 950;
    }

    .receipt-action {
      width: 100%;
      margin-top: 14px;
    }

    .reconciliation {
      display: grid;
      gap: 6px;
      margin-top: 14px;
      padding: 14px;
      border: 1px solid #bfe5d6;
      border-radius: 8px;
      background: #e8f7f1;
      color: #105f46;
      font-weight: 800;
    }

    .reconciliation span {
      color: #2f6f59;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.35;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .primary, .secondary {
      min-height: 46px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 900;
    }

    .primary {
      border: 0;
      background: var(--brand);
      color: #fff;
    }

    .secondary {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--brand-dark);
    }

    @media (max-width: 900px) {
      header, .workspace { grid-template-columns: 1fr; }
      .mode-switch { width: 100%; }
      .mode-switch button { min-width: 0; }
      .screen { min-height: auto; }
      .actions { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <div class="project-kicker">Projet PIE 2026 - EM Grenoble</div>
        <h1>Paiement en euro numérique</h1>
        <p class="lede">Deux vues synchronisées : ce que voit le client, et ce que voit le commerçant sur son TPE.</p>
      </div>
      <div>
        <div class="mode-switch" aria-label="Choix du mode de paiement">
          <button class="active" type="button" data-mode="qr">QR</button>
          <button type="button" data-mode="nfc">NFC</button>
        </div>
        <a class="offline-link" href="offline.html">Mode hors ligne</a>
      </div>
    </header>

    <section class="workspace" aria-label="Mockup paiement euro numérique">
      <article class="device" aria-label="Écran client">
        <div class="device-top">
          <span>Client</span>
          <span>App bancaire</span>
        </div>
        <div class="screen" id="clientScreen"></div>
      </article>

      <article class="device" aria-label="Écran commerçant">
        <div class="device-top">
          <span>Commerçant</span>
          <span>TPE</span>
        </div>
        <div class="screen" id="merchantScreen"></div>
      </article>
    </section>
  </main>

  <script>
    const sale = {
      merchant: "Auchan",
      amount: 14.43,
      label: "Achat Auchan",
      items: [
        { name: "Pancakes", price: 2.35 },
        { name: "Jus d'orange", price: 2.10 },
        { name: "Lait", price: 1.15 },
        { name: "Myrtilles", price: 3.49 },
        { name: "Confiture de pêche", price: 2.25 },
        { name: "Kiwi", price: 0.69 },
        { name: "Menthe thé vert", price: 2.40 }
      ],
      brand: "auchan",
      reference: "EEUR-WL-240426-8F3A",
      alias: "MRC-8F3A-214C"
    };

    const appOrigin = window.location.origin && window.location.origin !== "null" ? window.location.origin : "http://localhost:8765";
    const walletBalanceKey = "eeurWalletBalance";
    const defaultWalletBalance = 184.60;
    const saleParams = new URLSearchParams({
      merchant: sale.merchant,
      amount: sale.amount.toFixed(2),
      balance: getWalletBalance().toFixed(2),
      label: sale.label,
      ref: sale.reference,
      alias: sale.alias
    });
    const paymentLink = `${appOrigin}/wallet-demo.html?${saleParams.toString()}`;
    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&margin=12&data=${encodeURIComponent(paymentLink)}`;
    const statusUrl = `${appOrigin}/status`;
    const resetUrl = `${appOrigin}/reset`;

    const flows = {
      qr: [
        {
          clientStatus: "Scanner le QR affiché par le commerçant",
          merchantStatus: "QR e-EUR affiché",
          clientTitle: "Payer par QR",
          clientText: "Ouvrez le wallet et scannez le QR du TPE.",
          merchantTitle: "Demande de paiement",
          merchantText: "Le QR est prêt pour le client.",
          showQrClient: true,
          showQrMerchant: true,
          rail: "e-EUR / QR / AXIS"
        },
        {
          clientStatus: "Règlement e-EUR en cours",
          merchantStatus: "Validation PSP client / DESP",
          clientTitle: sale.merchant,
          clientText: "",
          merchantTitle: "Routage et règlement",
          merchantText: "AXIS route la demande. Le PSP client transmet l'ordre au DESP.",
          showQrClient: false,
          showQrMerchant: false,
          rail: "e-EUR / QR / AXIS"
        },
        {
          clientStatus: "Paiement accepté",
          merchantStatus: "Accepté - ticket disponible",
          clientTitle: "Ticket wallet",
          clientText: "Auchan - 14,43 €",
          merchantTitle: "Vente validée",
          merchantText: "Le paiement e-EUR est confirmé.",
          showQrClient: false,
          showQrMerchant: false,
          accepted: true,
          rail: "e-EUR / QR / AXIS"
        }
      ],
      nfc: [
        {
          clientStatus: "Approcher le téléphone du TPE",
          merchantStatus: "Présentez le téléphone",
          clientTitle: "Payer par NFC",
          clientText: "Le wallet est prêt pour le paiement e-EUR.",
          merchantTitle: "Montant prêt",
          merchantText: "Le TPE attend le téléphone du client.",
          showNfcClient: true,
          showNfcMerchant: true,
          rail: "e-EUR / NFC / AXIS"
        },
        {
          clientStatus: "Règlement e-EUR en cours",
          merchantStatus: "Validation PSP client / DESP",
          clientTitle: sale.merchant,
          clientText: "",
          merchantTitle: "Routage et règlement",
          merchantText: "AXIS route la demande. Le PSP client transmet l'ordre au DESP.",
          showNfcClient: false,
          showNfcMerchant: false,
          rail: "e-EUR / NFC / AXIS"
        },
        {
          clientStatus: "Paiement accepté",
          merchantStatus: "Accepté - ticket disponible",
          clientTitle: "Ticket wallet",
          clientText: "Auchan - 14,43 €",
          merchantTitle: "Vente validée",
          merchantText: "Le paiement e-EUR est confirmé.",
          showNfcClient: false,
          showNfcMerchant: false,
          accepted: true,
          rail: "e-EUR / NFC / AXIS"
        }
      ]
    };

    let mode = "qr";
    let step = 0;
    let settlementTimer;
    let settlementInProgress = false;
    let receiptVisible = false;
    let saleDebited = false;
    let paymentRefused = false;

    const clientScreen = document.querySelector("#clientScreen");
    const merchantScreen = document.querySelector("#merchantScreen");
    const money = value => value.toLocaleString("fr-FR", { style: "currency", currency: "EUR" });

    function getWalletBalance() {
      const storedBalance = Number(localStorage.getItem(walletBalanceKey));
      return Number.isFinite(storedBalance) ? storedBalance : defaultWalletBalance;
    }

    function setWalletBalance(balance) {
      localStorage.setItem(walletBalanceKey, String(Math.max(0, balance)));
    }

    function debitWalletForAcceptedSale() {
      if (saleDebited) return;
      setWalletBalance(getWalletBalance() - sale.amount);
      saleDebited = true;
    }

    function current() {
      if (paymentRefused) {
        return {
          clientStatus: "Paiement refusé",
          merchantStatus: "Paiement refusé",
          clientTitle: "Solde insuffisant",
          clientText: "Paiement refusé.",
          merchantTitle: "Paiement refusé",
          merchantText: "Le solde du wallet est insuffisant pour régler cette vente.",
          refused: true,
          rail: flows[mode][Math.min(step, flows[mode].length - 1)].rail
        };
      }
      return flows[mode][step];
    }

    function statusClass(state) {
      if (state.refused) return "status refused";
      if (state.accepted) return "status";
      if (step === 1) return "status neutral";
      return "status waiting";
    }

    function starRing(size = "") {
      const stars = Array.from({ length: 12 }, (_, index) => `<span style="--i:${index}">★</span>`).join("");
      return `<span class="eu-star-loader ${size}" aria-hidden="true">${stars}</span>`;
    }

    function statusContent(text) {
      if (step !== 1) return text;
      return `${starRing()}<span>${text}</span>`;
    }

    function settlementVisual() {
      if (step !== 1) return "";
      return `
        <div class="settlement-panel" aria-label="Règlement en cours">
          ${starRing("large")}
          <strong>Règlement e-EUR en cours</strong>
        </div>
      `;
    }

    function brandLogo(brand = sale.brand) {
      if (brand === "auchan") return `<div class="brand-logo auchan" aria-label="Logo Auchan"><svg class="auchan-bird" viewBox="0 0 64 44" aria-hidden="true" focusable="false"><path fill="#e31b23" d="M3 26c13 1 21-5 28-17 4 9 12 14 27 13-11 7-19 9-30 7-8 6-16 7-25 5 6-2 11-4 15-8-5 1-10 1-15 0Z"/><path fill="#e31b23" d="M18 13 31 2l7 16-15 5z"/><path fill="#00a86b" d="M7 34c11 1 20-1 27-7-2 10-9 15-20 14l4-5c-4 1-8 0-11-2Z"/><path fill="#00a86b" d="M25 30 39 42h-8L20 32z"/><circle cx="42" cy="15" r="3" fill="#fff"/><circle cx="43" cy="15" r="1.3" fill="#102033"/><path fill="#00a86b" d="m50 14 11-4-9 8z"/></svg><span>Auchan</span></div>`;
      if (brand === "transavia") return `<div class="brand-logo transavia" aria-label="Logo Transavia">transavia</div>`;
      return "";
    }

    function paymentVisual(state, side) {
      if ((side === "client" && state.showQrClient) || (side === "merchant" && state.showQrMerchant)) {
        return `
          <div class="qr-box">
            ${brandLogo()}
            <div class="qr-amount">${money(sale.amount)}</div>
            <a href="${paymentLink}" target="_blank" rel="noreferrer"><img src="${qrUrl}" alt="QR code wallet e-EUR" loading="eager"></a>
            <div class="qr-caption">${sale.merchant}</div>
          </div>
        `;
      }
      if ((side === "client" && state.showNfcClient) || (side === "merchant" && state.showNfcMerchant)) {
        return `
          <div class="nfc-visual" aria-label="Paiement NFC">
            <div class="nfc-symbol">NFC</div>
            <strong>Prêt au sans contact</strong>
          </div>
        `;
      }
      return "";
    }

    function renderClient() {
      const state = current();
      const balance = getWalletBalance();
      const nextButtonLabel = state.refused ? "Nouvelle vente" : state.accepted ? "Nouvelle vente" : "Continuer";
      clientScreen.innerHTML = `
        <div class="wallet-card">
          <div class="label">Wallet euro numérique</div>
          <div class="amount">${money(balance)}</div>
          <div>Alias client : CLT-92B7-F31D</div>
          <a class="wallet-action" href="recharger-wallet.html">Gérer mon wallet</a>
        </div>
        <div class="${statusClass(state)}">${statusContent(state.clientStatus)}</div>
        ${paymentVisual(state, "client")}
        ${settlementVisual()}
        <div class="card">
          <strong>${state.clientTitle}</strong>
          ${state.clientText ? `<p>${state.clientText}</p>` : ""}
        </div>
        <div class="actions">
          <button class="secondary" type="button" data-action="back">Retour</button>
          <button class="primary" type="button" data-action="next">${nextButtonLabel}</button>
        </div>
      `;
    }

    function renderMerchant() {
      const state = current();
      const nextButtonLabel = state.refused ? "Nouvelle vente" : state.accepted ? "Nouvelle vente" : "Continuer";
      const ticketItems = sale.items
        .map(item => `<div class="ticket-row"><span>${item.name}</span><strong>${money(item.price)}</strong></div>`)
        .join("");
      const receipt = receiptVisible ? `
        <div class="ticket" aria-label="Ticket de caisse Auchan">
          <div class="receipt-header">
            ${brandLogo()}
            <strong>Ticket de caisse</strong>
            <span>Paiement e-euro</span>
          </div>
          ${ticketItems}
          <div class="ticket-row receipt-total"><span>Total</span><strong>${money(sale.amount)}</strong></div>
          <div class="ticket-row"><span>Mode paiement</span><strong>e-euro</strong></div>
          <div class="ticket-row"><span>Statut</span><strong>${state.accepted ? "ACCEPTÉ" : state.refused ? "REFUSÉ" : "EN COURS"}</strong></div>
          <div class="ticket-row"><span>Ref.</span><strong>${sale.reference}</strong></div>
        </div>
      ` : "";
      merchantScreen.innerHTML = `
        <div class="merchant-total">
          ${brandLogo()}
          <div class="label">Montant</div>
          <div class="amount">${money(sale.amount)}</div>
        </div>
        <div class="${statusClass(state)}">${statusContent(state.merchantStatus)}</div>
        ${paymentVisual(state, "merchant")}
        ${settlementVisual()}
        <div class="card">
          <strong>${state.merchantTitle}</strong>
          <p>${state.merchantText}</p>
        </div>
        ${state.accepted ? `
          <button class="secondary receipt-action" type="button" data-action="generate-receipt">${receiptVisible ? "Masquer le ticket de caisse" : "Imprimer ticket de caisse"}</button>
        ` : ""}
        ${receipt}
        <div class="actions">
          <button class="secondary" type="button" data-action="back">Retour</button>
          <button class="primary" type="button" data-action="next">${nextButtonLabel}</button>
        </div>
      `;
    }

    function renderModeButtons() {
      document.querySelectorAll("[data-mode]").forEach(button => {
        button.classList.toggle("active", button.dataset.mode === mode);
      });
    }

    function next() {
      if (paymentRefused) {
        paymentRefused = false;
        receiptVisible = false;
        saleDebited = false;
        step = 0;
        if (mode === "qr") fetch(resetUrl, { method: "POST" }).catch(() => {});
        render();
        return;
      }
      const wasAccepted = step === flows[mode].length - 1;
      step = wasAccepted ? 0 : step + 1;
      if (wasAccepted) {
        receiptVisible = false;
        saleDebited = false;
      }
      if (current().accepted) {
        if (getWalletBalance() < sale.amount) {
          paymentRefused = true;
          step = flows[mode].length - 1;
        } else {
          debitWalletForAcceptedSale();
        }
      }
      if (mode === "qr" && wasAccepted) fetch(resetUrl, { method: "POST" }).catch(() => {});
      render();
    }

    function back() {
      if (paymentRefused) {
        paymentRefused = false;
        step = 0;
        render();
        return;
      }
      step = Math.max(0, step - 1);
      render();
    }

    function setMode(nextMode) {
      mode = nextMode;
      step = 0;
      receiptVisible = false;
      saleDebited = false;
      paymentRefused = false;
      settlementInProgress = false;
      clearTimeout(settlementTimer);
      render();
    }

    function showSettlementThenAccept(accepted) {
      if (settlementInProgress || step >= flows.qr.length - 1) return;
      settlementInProgress = true;
      step = 1;
      render();
      clearTimeout(settlementTimer);
      settlementTimer = setTimeout(() => {
        if (mode !== "qr") return;
        settlementInProgress = false;
        if (!accepted) {
          paymentRefused = true;
          step = flows.qr.length - 1;
        } else {
          step = flows.qr.length - 1;
          debitWalletForAcceptedSale();
        }
        render();
      }, 3000);
    }

    function render() {
      renderModeButtons();
      renderClient();
      renderMerchant();
    }

    document.addEventListener("click", event => {
      const modeButton = event.target.closest("[data-mode]");
      if (modeButton) setMode(modeButton.dataset.mode);
      const action = event.target.closest("[data-action]")?.dataset.action;
      if (action === "next") next();
      if (action === "back") back();
      if (action === "generate-receipt") {
        receiptVisible = !receiptVisible;
        render();
      }
    });

    setInterval(async () => {
      if (mode !== "qr" || step === flows.qr.length - 1) return;
      try {
        const response = await fetch(statusUrl, { cache: "no-store" });
        const data = await response.json();
        if (data.confirmed) {
          showSettlementThenAccept(data.accepted);
        }
      } catch (error) {}
    }, 1200);

    render();

    window.addEventListener("pageshow", render);
  </script>
</body>
</html>
