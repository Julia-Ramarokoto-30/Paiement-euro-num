<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recharger mon wallet e-EUR</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #172033;
      --muted: #667085;
      --line: #d9e2ec;
      --brand: #007781;
      --brand-dark: #03515a;
      --ok: #12805c;
      --warn: #a15c07;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
      background: linear-gradient(135deg, #08777f, #163f86);
      color: var(--ink);
    }

    main {
      width: min(460px, 100%);
      overflow: hidden;
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 24px 70px rgba(10, 30, 50, .25);
    }

    header {
      padding: 18px;
      background: #102033;
      color: #fff;
    }

    .label {
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    header .label { color: rgba(255,255,255,.65); }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    section { padding: 18px; }

    .balance-card {
      padding: 16px;
      border-radius: 8px;
      background: #102033;
      color: #fff;
    }

    .balance-card .label { color: rgba(255,255,255,.64); }

    .amount {
      margin: 4px 0 8px;
      font-size: 50px;
      font-weight: 950;
      letter-spacing: 0;
    }

    .helper {
      margin: 0;
      color: #455468;
      line-height: 1.45;
    }

    form {
      display: grid;
      gap: 14px;
      margin-top: 16px;
    }

    label {
      display: grid;
      gap: 7px;
      color: #344054;
      font-weight: 900;
    }

    input {
      width: 100%;
      min-height: 52px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      font: inherit;
      font-size: 22px;
      font-weight: 900;
    }

    input:focus {
      border-color: var(--brand);
      outline: 3px solid rgba(0, 119, 129, .18);
    }

    .limit {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      border: 1px solid #cfe0ff;
      border-radius: 8px;
      background: #edf4ff;
      color: #173f8a;
      font-weight: 900;
    }

    .status {
      display: none;
      padding: 12px;
      border-radius: 8px;
      background: #e8f7f1;
      color: var(--ok);
      font-weight: 900;
      text-align: center;
    }

    .status.show { display: block; }
    .status.error { background: #fff7e6; color: var(--warn); }

    .initial-editor {
      display: none;
      gap: 14px;
      margin-top: 14px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fbfd;
    }

    .initial-editor.show { display: grid; }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button,
    .secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      border-radius: 8px;
      font: inherit;
      font-weight: 900;
      text-decoration: none;
      cursor: pointer;
    }

    .edit-balance {
      width: 100%;
      min-height: 42px;
      margin-top: 14px;
      border: 1px solid rgba(255,255,255,.36);
      border-radius: 8px;
      background: rgba(255,255,255,.12);
      color: #fff;
      font-size: 13px;
    }

    button {
      border: 0;
      background: var(--brand);
      color: #fff;
    }

    button:disabled {
      background: #8fbfc4;
      cursor: not-allowed;
    }

    .secondary {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--brand-dark);
    }

    @media (max-width: 460px) {
      .actions { grid-template-columns: 1fr; }
      .amount { font-size: 42px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="label">Wallet euro numérique</div>
      <h1>Recharger mon wallet</h1>
    </header>
    <section>
      <div class="balance-card">
        <div class="label">Solde actuel</div>
        <div class="amount" id="balance">184,60 €</div>
        <div>Alias client : CLT-92B7-F31D</div>
        <button class="edit-balance" id="toggleInitialEditor" type="button">Modifier solde initial</button>
      </div>

      <form id="topupForm">
        <p class="helper">Saisissez le montant à ajouter au wallet. Le solde du wallet est plafonné à 3 000 €.</p>
        <label>
          Montant de recharge
          <input id="topupAmount" name="amount" type="number" min="1" step="0.01" value="50" inputmode="decimal" required>
        </label>
        <div class="limit"><span>Plafond</span><strong>3 000 €</strong></div>
        <div class="status" id="status" role="status" aria-live="polite"></div>
        <div class="actions">
          <a class="secondary" href="index.html">Retour</a>
          <button id="submitButton" type="submit">Recharger</button>
        </div>
      </form>

      <form class="initial-editor" id="initialEditor">
        <p class="helper">Définissez le solde initial du wallet. La valeur sera aussi appliquée sur la page principale.</p>
        <label>
          Solde initial
          <input id="initialBalance" name="initialBalance" type="number" min="0" step="0.01" inputmode="decimal" required>
        </label>
        <div class="actions">
          <button class="secondary" id="cancelInitialEditor" type="button">Annuler</button>
          <button type="submit">Enregistrer</button>
        </div>
      </form>
    </section>
  </main>
  <script>
    const maxBalance = 3000;
    const walletBalanceKey = "eeurWalletBalance";
    const defaultWalletBalance = 184.60;
    const storedBalance = Number(localStorage.getItem(walletBalanceKey));
    let balance = Number.isFinite(storedBalance) ? storedBalance : defaultWalletBalance;
    const money = value => value.toLocaleString("fr-FR", { style: "currency", currency: "EUR" });
    const balanceNode = document.querySelector("#balance");
    const statusNode = document.querySelector("#status");
    const amountInput = document.querySelector("#topupAmount");
    const submitButton = document.querySelector("#submitButton");
    const initialEditor = document.querySelector("#initialEditor");
    const initialBalanceInput = document.querySelector("#initialBalance");

    function showStatus(message, error = false) {
      statusNode.textContent = message;
      statusNode.className = `status show${error ? " error" : ""}`;
    }

    function saveBalance(nextBalance) {
      balance = nextBalance;
      localStorage.setItem(walletBalanceKey, String(balance));
      balanceNode.textContent = money(balance);
    }

    balanceNode.textContent = money(balance);

    document.querySelector("#toggleInitialEditor").addEventListener("click", () => {
      initialBalanceInput.value = balance.toFixed(2);
      initialEditor.classList.toggle("show");
      statusNode.className = "status";
    });

    document.querySelector("#cancelInitialEditor").addEventListener("click", () => {
      initialEditor.classList.remove("show");
    });

    document.querySelector("#topupForm").addEventListener("submit", event => {
      event.preventDefault();
      const amount = Number(amountInput.value);
      if (!Number.isFinite(amount) || amount <= 0) {
        showStatus("Saisissez un montant supérieur à 0 €.", true);
        return;
      }
      submitButton.disabled = true;
      submitButton.textContent = "Recharge en cours";
      showStatus("Validation PSP client / DESP");

      setTimeout(() => {
        const nextBalance = balance + amount;
        const limited = nextBalance > maxBalance;
        saveBalance(limited ? maxBalance : nextBalance);
        submitButton.disabled = false;
        submitButton.textContent = "Recharger";
        if (limited) {
          showStatus("Votre solde ne peut exceder 3000 euros.", true);
          return;
        }
        showStatus(`Wallet rechargé de ${money(amount)}.`);
      }, 1200);
    });

    initialEditor.addEventListener("submit", event => {
      event.preventDefault();
      const nextBalance = Number(initialBalanceInput.value);
      if (!Number.isFinite(nextBalance) || nextBalance < 0) {
        showStatus("Saisissez un solde positif.", true);
        return;
      }
      const limited = nextBalance > maxBalance;
      saveBalance(limited ? maxBalance : nextBalance);
      initialEditor.classList.remove("show");
      showStatus(limited ? "Votre solde ne peut exceder 3000 euros." : `Solde initial modifié à ${money(balance)}.`, limited);
    });
  </script>
</body>
</html>
