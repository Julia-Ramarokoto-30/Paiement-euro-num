<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Projet PIE - EM grenoble - Mockup Euronumérique</title>
  <meta property="og:title" content="Projet PIE - EM grenoble - Mockup Euronumérique">
  <meta name="twitter:title" content="Projet PIE - EM grenoble - Mockup Euronumérique">
  <link rel="preload" as="image" href="magasin-bg.jpg">
  <style>
    :root {
      color-scheme: light;
      --ink: #172033;
      --muted: #667085;
      --line: #d9e2ec;
      --panel: #ffffff;
      --soft: #f4f7fb;
      --brand: #007781;
      --brand-dark: #03515a;
      --blue: #173f8a;
      --ok: #12805c;
      --wait: #a15c07;
      --shadow: 0 22px 60px rgba(13, 35, 58, 0.16);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      position: relative;
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      background: #0a6177;
      color: var(--ink);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        linear-gradient(135deg, rgba(8,119,127,.74), rgba(22,63,134,.82)),
        url("magasin-bg.jpg") center / cover no-repeat;
      filter: saturate(.92);
      pointer-events: none;
    }

    button { font: inherit; }

    main {
      position: relative;
      z-index: 1;
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 34px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: end;
      margin-bottom: 18px;
      color: #fff;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 4vw, 48px);
      line-height: 1.04;
      letter-spacing: 0;
    }

    .project-kicker {
      width: fit-content;
      margin-bottom: 10px;
      padding: 4px 7px;
      border: 2px solid rgba(255,255,255,.28);
      border-radius: 6px;
      color: rgba(255,255,255,.78);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .lede {
      max-width: 760px;
      margin: 10px 0 0;
      color: rgba(255,255,255,.86);
      font-size: 16px;
      line-height: 1.5;
    }

    .mode-switch {
      display: inline-grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      padding: 6px;
      border: 2px solid rgba(255,255,255,.36);
      border-radius: 8px;
      background: rgba(255,255,255,.14);
    }

    .mode-switch button {
      min-height: 40px;
      min-width: 132px;
      padding: 8px 14px;
      border: 0;
      border-radius: 7px;
      background: transparent;
      color: rgba(255,255,255,.82);
      cursor: pointer;
      font-weight: 900;
    }

    .mode-switch button.active {
      background: #fff;
      color: var(--brand-dark);
    }

    .offline-link {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      margin-top: 8px;
      border: 2px solid rgba(255,255,255,.36);
      border-radius: 8px;
      color: #fff;
      text-decoration: none;
      font-size: 13px;
      font-weight: 900;
      background: rgba(255,255,255,.12);
    }

    .workspace {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      align-items: start;
    }

    .basket-banner {
      margin: 0 0 18px;
      padding: 14px;
      border: 2px solid rgba(255,255,255,.32);
      border-radius: 8px;
      background: rgba(255,255,255,.16);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
    }

    .basket-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .basket-title {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #fff;
      font-size: 15px;
      font-weight: 950;
    }

    .basket-icon {
      display: block;
      width: 34px;
      height: 34px;
      object-fit: contain;
    }

    .basket-total {
      color: #fff;
      font-size: 18px;
      font-weight: 950;
      white-space: nowrap;
    }

    .basket-items {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .basket-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      min-height: 42px;
      padding: 9px 10px;
      border: 2px solid rgba(255,255,255,.68);
      border-radius: 8px;
      background: rgba(232, 247, 241, .46);
      color: #fff;
      font-size: 13px;
      font-weight: 850;
    }

    .basket-item span:first-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .basket-item span:last-child {
      color: #fff;
      font-weight: 950;
      white-space: nowrap;
    }

    .device {
      overflow: hidden;
      border: 2px solid rgba(255,255,255,.28);
      border-radius: 8px;
      background: rgba(255,255,255,.16);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
    }

    .device-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 13px 16px;
      border-bottom: 1px solid rgba(255,255,255,.28);
      color: rgba(255,255,255,.86);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .screen {
      min-height: 660px;
      padding: 18px;
      background: rgba(255,255,255,.72);
    }

    .label {
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .wallet-card {
      padding: 16px;
      border-radius: 8px;
      background: #102033;
      color: #fff;
    }

    .wallet-card .label { color: rgba(255,255,255,.64); }

    .wallet-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: relative;
      min-height: 40px;
      margin-top: 14px;
      padding: 8px 13px;
      border: 2px solid rgba(255,255,255,.36);
      border-radius: 8px;
      background: rgba(255,255,255,.12);
      color: #fff;
      text-decoration: none;
      font-size: 13px;
      font-weight: 900;
    }

    .flow-bubble {
      position: relative;
      min-height: 72px;
      margin: 14px 0;
      padding: 13px 14px 13px 44px;
      border: 1px solid #89d6d7;
      border-radius: 8px;
      background: #f2fbfb;
      color: #1f5560;
      font-size: 14px;
      line-height: 1.42;
      box-shadow: 0 8px 22px rgba(13, 35, 58, .07);
    }

    .flow-bubble::before {
      content: "";
      position: absolute;
      left: 18px;
      top: 21px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--brand);
      box-shadow: 0 0 0 6px rgba(0,119,129,.14);
    }

    .click-hint { position: relative; }

    .click-arrow {
      position: absolute;
      z-index: 5;
      color: #f5c542;
      font-size: 28px;
      font-weight: 950;
      line-height: 1;
      text-shadow: 0 2px 8px rgba(16,32,51,.25);
      animation: blinkArrow .82s ease-in-out infinite;
      pointer-events: none;
    }

    .click-arrow.down {
      left: 50%;
      top: -32px;
      transform: translateX(-50%);
    }

    .click-arrow.left {
      right: -34px;
      top: 50%;
      transform: translateY(-50%);
    }

    .click-arrow.action-arrow {
      left: -34px;
      top: 50%;
      transform: translateY(-50%) rotate(-90deg);
    }

    .click-arrow.wallet-arrow {
      right: -34px;
      top: 50%;
      transform: translateY(-50%) rotate(90deg);
    }

    .status-text {
      position: relative;
      display: inline-block;
    }

    .status-text .click-arrow.wallet-arrow {
      right: -34px;
    }

    .click-arrow.bubble-arrow {
      left: -34px;
      top: 50%;
      transform: translateY(-50%) rotate(-90deg);
    }

    @keyframes blinkArrow {
      0%, 100% { opacity: .18; }
      50% { opacity: 1; }
    }

    .amount {
      margin: 4px 0 12px;
      color: var(--brand-dark);
      font-size: clamp(40px, 6vw, 58px);
      font-weight: 900;
      letter-spacing: 0;
    }

    .wallet-card .amount { color: #fff; }

    .status {
      display: flex;
      align-items: center;
      min-height: 46px;
      margin: 14px 0;
      padding: 11px 13px;
      border-radius: 8px;
      background: #e8f7f1;
      color: var(--ok);
      font-weight: 900;
    }

    .eu-star-loader {
      position: relative;
      flex: 0 0 auto;
      width: 28px;
      height: 28px;
      margin-right: 10px;
      animation: spinStars 1.4s linear infinite;
    }

    .eu-star-loader span {
      position: absolute;
      left: 50%;
      top: 50%;
      color: #f5c542;
      font-size: 8px;
      line-height: 1;
      transform: rotate(calc(var(--i) * 30deg)) translateY(-11px);
      transform-origin: 0 0;
    }

    .eu-star-loader.large {
      width: 86px;
      height: 86px;
      margin: 0 auto 16px;
    }

    .eu-star-loader.large span {
      font-size: 17px;
      transform: rotate(calc(var(--i) * 30deg)) translateY(-36px);
    }

    @keyframes spinStars {
      to { transform: rotate(360deg); }
    }

    .settlement-panel {
      display: grid;
      place-items: center;
      min-height: 238px;
      margin: 14px 0;
      padding: 24px;
      border: 1px solid #cfe0ff;
      border-radius: 8px;
      background: linear-gradient(135deg, #f6f9ff, #edf4ff);
      text-align: center;
    }

    .settlement-panel strong {
      display: block;
      color: var(--blue);
      font-size: 18px;
      margin-bottom: 6px;
    }

    .settlement-panel p {
      max-width: 320px;
      margin: 0;
      color: #455468;
      line-height: 1.4;
    }


    .status.waiting { background: #edf8f9; color: var(--brand-dark); }
    .status.neutral { background: #edf4ff; color: var(--blue); }
    .status.refused { background: #fff1f3; color: #b42318; }

    .card {
      margin-top: 12px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .card strong {
      display: block;
      margin-bottom: 5px;
      font-size: 15px;
    }

    .card p {
      margin: 0;
      color: #455468;
      line-height: 1.45;
    }

    .qr-box {
      display: grid;
      place-items: center;
      margin: 14px 0;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .brand-logo {
      display: inline-grid;
      place-items: center;
      width: fit-content;
      min-height: 34px;
      margin-bottom: 10px;
      padding: 6px 12px;
      border-radius: 6px;
      font-weight: 950;
      letter-spacing: 0;
      line-height: 1;
    }

    .brand-logo.casino {
      background: transparent;
      padding: 0;
    }

    .casino-logo {
      display: block;
      width: 150px;
      max-width: 100%;
      height: auto;
    }

    .brand-logo.transavia {
      background: #00a86b;
      color: #fff;
      font-size: 17px;
    }

    .brand-logo.transavia::first-letter { color: #d9f000; }

    .qr-amount {
      margin-bottom: 12px;
      color: var(--brand-dark);
      font-size: 30px;
      font-weight: 950;
      line-height: 1;
    }

    .qr-box img {
      display: block;
      width: min(100%, 280px);
      aspect-ratio: 1;
      image-rendering: pixelated;
    }

    .qr-caption {
      margin-top: 9px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-align: center;
    }

    .qr-camera-shot {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 330px;
      margin: 14px 0;
      padding: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #111820;
    }

    .qr-camera-photo {
      display: block;
      width: 100%;
      height: clamp(420px, 52vw, 620px);
      object-fit: cover;
      object-position: center;
    }

    .nfc-visual {
      display: grid;
      place-items: center;
      min-height: 238px;
      margin: 14px 0;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(135deg, #edf8f9, #fff);
      text-align: center;
    }

    .nfc-symbol {
      display: grid;
      place-items: center;
      width: 116px;
      height: 116px;
      margin-bottom: 12px;
      border-radius: 50%;
      background: #102033;
      color: #fff;
      font-size: 34px;
      font-weight: 900;
    }

    .merchant-total {
      padding: 18px;
      border-radius: 8px;
      background: #f5fbfb;
      border: 1px solid #cbe4e7;
    }

    .ticket {
      display: grid;
      gap: 9px;
      margin-top: 14px;
      padding: 14px;
      border: 1px dashed #9aa8b7;
      border-radius: 8px;
      background: #fff;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      color: #344054;
    }

    .ticket-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .receipt-header {
      display: grid;
      gap: 6px;
      padding-bottom: 10px;
      border-bottom: 1px dashed #9aa8b7;
    }

    .receipt-header .brand-logo {
      margin-bottom: 0;
    }

    .receipt-header .casino-logo {
      width: 132px;
    }

    .receipt-header strong {
      color: var(--ink);
      font-size: 16px;
    }

    .receipt-header span {
      color: var(--brand-dark);
      font-weight: 950;
      text-transform: uppercase;
    }

    .receipt-total {
      margin-top: 4px;
      padding-top: 10px;
      border-top: 1px dashed #9aa8b7;
      font-weight: 950;
    }

    .receipt-action {
      width: 100%;
      margin-top: 14px;
    }

    .reconciliation {
      display: grid;
      gap: 6px;
      margin-top: 14px;
      padding: 14px;
      border: 1px solid #bfe5d6;
      border-radius: 8px;
      background: #e8f7f1;
      color: #105f46;
      font-weight: 800;
    }

    .reconciliation span {
      color: #2f6f59;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.35;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 14px;
    }

    .primary, .secondary {
      min-height: 46px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 900;
    }

    .primary {
      border: 0;
      background: var(--brand);
      color: #fff;
    }

    .secondary {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--brand-dark);
    }

    .next-arrow-button {
      width: 58px;
      min-height: 50px;
      padding: 0;
      font-size: 28px;
      line-height: 1;
    }

    @media (max-width: 900px) {
      header, .workspace { grid-template-columns: 1fr; }
      .basket-items { grid-template-columns: 1fr 1fr; }
      .mode-switch { width: 100%; }
      .mode-switch button { min-width: 0; }
      .screen { min-height: auto; }
    }

    @media (max-width: 560px) {
      .basket-heading { align-items: flex-start; flex-direction: column; }
      .basket-items { grid-template-columns: 1fr; }
      .basket-item span:first-child { white-space: normal; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <div class="project-kicker">Projet PIE 2026 - EM Grenoble</div>
        <h1>Paiement en euro numérique</h1>
      </div>
      <div>
        <div class="mode-switch" aria-label="Choix du mode de paiement">
          <button class="active" type="button" data-mode="qr">QR</button>
          <button type="button" data-mode="nfc">NFC</button>
        </div>
        <a class="offline-link" href="offline.html">Mode hors ligne</a>
      </div>
    </header>

    <section class="basket-banner" aria-label="Articles du panier">
      <div class="basket-heading">
        <div class="basket-title"><img class="basket-icon" src="6680292.png" alt="" aria-hidden="true"><strong>Articles du panier</strong></div>
        <div class="basket-total" id="basketTotal"></div>
      </div>
      <div class="basket-items" id="basketItems"></div>
    </section>

    <section class="workspace" aria-label="Mockup paiement euro numérique">
      <article class="device" aria-label="Écran client">
        <div class="device-top">
          <span>Client</span>
          <span>App bancaire</span>
        </div>
        <div class="screen" id="clientScreen"></div>
      </article>

      <article class="device" aria-label="Écran commerçant">
        <div class="device-top">
          <span>Commerçant</span>
          <span>TPE</span>
        </div>
        <div class="screen" id="merchantScreen"></div>
      </article>
    </section>
  </main>

  <script>
    const sale = {
      merchant: "Casino",
      amount: 14.43,
      label: "Achat Casino",
      items: [
        { name: "Pancakes", price: 2.35 },
        { name: "Jus d'orange", price: 2.10 },
        { name: "Lait", price: 1.15 },
        { name: "Myrtilles", price: 3.49 },
        { name: "Confiture de pêche", price: 2.25 },
        { name: "Kiwi", price: 0.69 },
        { name: "Menthe thé vert", price: 2.40 }
      ],
      brand: "casino",
      reference: "EEUR-WL-240426-8F3A",
      alias: "MRC-8F3A-214C"
    };

    const appOrigin = window.location.origin && window.location.origin !== "null" ? window.location.origin : "http://localhost:8765";
    const walletBalanceKey = "eeurWalletBalance";
    const defaultWalletBalance = 184.60;
    const saleParams = new URLSearchParams({
      merchant: sale.merchant,
      amount: sale.amount.toFixed(2),
      balance: getWalletBalance().toFixed(2),
      label: sale.label,
      ref: sale.reference,
      alias: sale.alias
    });
    const paymentLink = `${appOrigin}/wallet-demo.html?${saleParams.toString()}`;
    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=420x420&margin=24&data=${encodeURIComponent(paymentLink)}`;
    const statusUrl = `${appOrigin}/status`;
    const resetUrl = `${appOrigin}/reset`;
    const guideStageKey = "eeurIndexGuideStage";
    const pageParams = new URLSearchParams(window.location.search);
    if (pageParams.get("wallet") === "done") {
      sessionStorage.setItem(guideStageKey, "scan");
      window.history.replaceState({}, "", window.location.pathname);
    }

    const flows = {
      qr: [
        {
          clientStatus: "Scanner le QR code présenté par le commerçant",
          merchantStatus: "",
          clientTitle: "",
          clientText: "",
          merchantTitle: "",
          merchantText: "",
          showQrClient: true,
          showQrMerchant: true,
          rail: "e-EUR / QR / AXIS"
        },
        {
          clientStatus: "Règlement e-EUR en cours",
          merchantStatus: "Validation PSP client / DESP",
          clientTitle: sale.merchant,
          clientText: "",
          merchantTitle: "Routage et règlement",
          merchantText: "AXIS route la demande. Le PSP client transmet l'ordre au DESP.",
          showQrClient: false,
          showQrMerchant: false,
          rail: "e-EUR / QR / AXIS"
        },
        {
          clientStatus: "Paiement accepté",
          merchantStatus: "Accepté - ticket disponible",
          clientTitle: "Ticket wallet",
          clientText: "Casino - 14,43 €",
          merchantTitle: "Vente validée",
          merchantText: "Le paiement e-EUR est confirmé.",
          showQrClient: false,
          showQrMerchant: false,
          accepted: true,
          rail: "e-EUR / QR / AXIS"
        }
      ],
      nfc: [
        {
          clientStatus: "Approcher le téléphone du TPE",
          merchantStatus: "",
          clientTitle: "",
          clientText: "",
          merchantTitle: "Montant prêt",
          merchantText: "Le TPE attend le téléphone du client.",
          showNfcClient: true,
          showNfcMerchant: true,
          rail: "e-EUR / NFC / AXIS"
        },
        {
          clientStatus: "Règlement e-EUR en cours",
          merchantStatus: "Validation PSP client / DESP",
          clientTitle: sale.merchant,
          clientText: "",
          merchantTitle: "Routage et règlement",
          merchantText: "AXIS route la demande. Le PSP client transmet l'ordre au DESP.",
          showNfcClient: false,
          showNfcMerchant: false,
          rail: "e-EUR / NFC / AXIS"
        },
        {
          clientStatus: "Paiement accepté",
          merchantStatus: "Accepté - ticket disponible",
          clientTitle: "Ticket wallet",
          clientText: "Casino - 14,43 €",
          merchantTitle: "Vente validée",
          merchantText: "Le paiement e-EUR est confirmé.",
          showNfcClient: false,
          showNfcMerchant: false,
          accepted: true,
          rail: "e-EUR / NFC / AXIS"
        }
      ]
    };

    let mode = "qr";
    let step = 0;
    let settlementTimer;
    let settlementInProgress = false;
    let receiptVisible = false;
    let saleDebited = false;
    let paymentRefused = false;
    let guideStage = sessionStorage.getItem(guideStageKey) || "wallet";

    const clientScreen = document.querySelector("#clientScreen");
    const merchantScreen = document.querySelector("#merchantScreen");
    const basketItems = document.querySelector("#basketItems");
    const basketTotal = document.querySelector("#basketTotal");
    const money = value => value.toLocaleString("fr-FR", { style: "currency", currency: "EUR" });

    function getWalletBalance() {
      const storedBalance = Number(localStorage.getItem(walletBalanceKey));
      return Number.isFinite(storedBalance) ? storedBalance : defaultWalletBalance;
    }

    function setWalletBalance(balance) {
      localStorage.setItem(walletBalanceKey, String(Math.max(0, balance)));
    }

    function debitWalletForAcceptedSale() {
      if (saleDebited) return;
      setWalletBalance(getWalletBalance() - sale.amount);
      saleDebited = true;
    }

    function current() {
      if (paymentRefused) {
        return {
          clientStatus: "Paiement refusé",
          merchantStatus: "Paiement refusé",
          clientTitle: "Solde insuffisant",
          clientText: "Paiement refusé.",
          merchantTitle: "Paiement refusé",
          merchantText: "Le solde du wallet est insuffisant pour régler cette vente.",
          refused: true,
          rail: flows[mode][Math.min(step, flows[mode].length - 1)].rail
        };
      }
      return flows[mode][step];
    }

    function statusClass(state) {
      if (state.refused) return "status refused";
      if (state.accepted) return "status";
      if (step === 1) return "status neutral";
      return "status waiting";
    }

    function starRing(size = "") {
      const stars = Array.from({ length: 12 }, (_, index) => `<span style="--i:${index}">★</span>`).join("");
      return `<span class="eu-star-loader ${size}" aria-hidden="true">${stars}</span>`;
    }

    function statusContent(text) {
      if (step !== 1) return text;
      return `${starRing()}<span>${text}</span>`;
    }

    function settlementVisual() {
      if (step !== 1) return "";
      return `
        <div class="settlement-panel" aria-label="Règlement en cours">
          ${starRing("large")}
          <strong>Règlement e-EUR en cours</strong>
        </div>
      `;
    }

    function setGuideStage(nextStage) {
      guideStage = nextStage;
      sessionStorage.setItem(guideStageKey, nextStage);
    }

    function guideArrow(target, variant = "down") {
      const arrowClass = variant === "wallet" ? "wallet-arrow" : variant === "bubble" ? "bubble-arrow" : variant === "action" ? "action-arrow" : "down";
      return (mode === "qr" || mode === "nfc") && guideStage === target ? `<span class="click-arrow ${arrowClass}" aria-hidden="true">↓</span>` : "";
    }

    function scanStatusClass(state) {
      const status = statusClass(state);
      return step === 0 && (mode === "nfc" || ["wallet", "scan"].includes(guideStage)) ? `${status} click-hint` : status;
    }

    function statusGuideArrow() {
      if (step !== 0) return "";
      if (mode === "nfc") return `<span class="click-arrow wallet-arrow" aria-hidden="true">↓</span>`;
      if (["wallet", "scan"].includes(guideStage)) return guideArrow(guideStage, "wallet");
      return "";
    }

    function brandLogo(brand = sale.brand) {
      if (brand === "casino" || brand === "auchan") return `<div class="brand-logo casino" aria-label="Logo Casino"><img class="casino-logo" src="casino.png?v=2" alt="Casino" loading="eager"></div>`;
      if (brand === "transavia") return `<div class="brand-logo transavia" aria-label="Logo Transavia">transavia</div>`;
      return "";
    }

    function paymentVisual(state, side) {
      if ((side === "client" && state.showQrClient) || (side === "merchant" && state.showQrMerchant)) {
        if (side === "client") {
          return `
            <div class="qr-camera-shot ${guideStage === "scan" ? "click-hint" : ""}" data-action="scan-guide" aria-label="Vue caméra du client scannant le QR code du TPE">
              ${guideArrow("scan")}
              <img class="qr-camera-photo" src="paiement-magasin-nohead.png" alt="TPE affichant un QR code de paiement" loading="eager">
            </div>
          `;
        }
        return `
          <div class="qr-box">
            <img src="${qrUrl}" alt="QR code e-EUR affiché sur le TPE" loading="eager">
          </div>
        `;
      }
      if ((side === "client" && state.showNfcClient) || (side === "merchant" && state.showNfcMerchant)) {
        return `
          <div class="nfc-visual" aria-label="Paiement NFC">
            <div class="nfc-symbol">NFC</div>
            <strong>Prêt au sans contact</strong>
          </div>
        `;
      }
      return "";
    }

    function renderBasket() {
      basketTotal.textContent = money(sale.amount);
      basketItems.innerHTML = sale.items
        .map(item => `<div class="basket-item"><span>${item.name}</span><span>${money(item.price)}</span></div>`)
        .join("");
    }

    function renderClient() {
      const state = current();
      const balance = getWalletBalance();
      const nextButtonLabel = state.refused ? "Nouvel achat" : state.accepted ? "Nouvel achat" : "Continuer";
      clientScreen.innerHTML = `
        <div class="wallet-card">
          <div class="label">Wallet euro numérique</div>
          <div class="amount">${money(balance)}</div>
          <div>Alias client : CLT-92B7-F31D</div>
          <a class="wallet-action ${guideStage === "wallet" ? "click-hint" : ""}" href="recharger-wallet.html">${guideArrow("wallet", "wallet")}Gérer mon wallet</a>
        </div>
        ${state.clientStatus ? `<div class="${scanStatusClass(state)}"><span class="status-text">${statusContent(state.clientStatus)}${statusGuideArrow()}</span></div>` : ""}
        ${paymentVisual(state, "client")}
        ${settlementVisual()}
        ${state.clientTitle || state.clientText ? `<div class="card">
          <strong>${state.clientTitle}</strong>
          ${state.clientText ? `<p>${state.clientText}</p>` : ""}
        </div>` : ""}
        ${state.accepted || state.refused ? `<div class="actions"><button class="primary next-arrow-button click-hint" type="button" data-action="next" aria-label="${nextButtonLabel}"><span class="click-arrow action-arrow" aria-hidden="true">↓</span><span aria-hidden="true">→</span></button></div>` : ""}
      `;
    }

    function renderMerchant() {
      const state = current();
      const nextButtonLabel = state.refused ? "Nouvel achat" : state.accepted ? "Nouvel achat" : "Continuer";
      const showReceiptArrow = mode === "qr" && guideStage === "receipt" && state.accepted && !receiptVisible;
      const ticketItems = sale.items
        .map(item => `<div class="ticket-row"><span>${item.name}</span><strong>${money(item.price)}</strong></div>`)
        .join("");
      const receipt = receiptVisible ? `
        <div class="ticket" aria-label="Ticket de caisse Casino">
          <div class="receipt-header">
            ${brandLogo()}
            <strong>Ticket de caisse</strong>
            <span>Paiement e-euro</span>
          </div>
          ${ticketItems}
          <div class="ticket-row receipt-total"><span>Total</span><strong>${money(sale.amount)}</strong></div>
          <div class="ticket-row"><span>Mode paiement</span><strong>e-euro</strong></div>
          <div class="ticket-row"><span>Statut</span><strong>${state.accepted ? "ACCEPTÉ" : state.refused ? "REFUSÉ" : "EN COURS"}</strong></div>
          <div class="ticket-row"><span>Ref.</span><strong>${sale.reference}</strong></div>
        </div>
      ` : "";
      merchantScreen.innerHTML = `
        <div class="merchant-total">
          ${brandLogo()}
          <div class="label">Montant</div>
          <div class="amount">${money(sale.amount)}</div>
        </div>
        ${state.merchantStatus ? `<div class="${statusClass(state)}">${statusContent(state.merchantStatus)}</div>` : ""}
        ${paymentVisual(state, "merchant")}
        ${settlementVisual()}
        ${state.merchantTitle || state.merchantText ? `<div class="card">
          <strong>${state.merchantTitle}</strong>
          <p>${state.merchantText}</p>
        </div>` : ""}
        ${state.accepted ? `
          <button class="secondary receipt-action ${showReceiptArrow ? "click-hint" : ""}" type="button" data-action="generate-receipt">${showReceiptArrow ? guideArrow("receipt", "action") : ""}${receiptVisible ? "Masquer le ticket de caisse" : "Imprimer ticket de caisse"}</button>
        ` : ""}
        ${receipt}
      `;
    }

    function renderModeButtons() {
      document.querySelectorAll("[data-mode]").forEach(button => {
        button.classList.toggle("active", button.dataset.mode === mode);
      });
    }

    function next() {
      if (paymentRefused) {
        paymentRefused = false;
        receiptVisible = false;
        saleDebited = false;
        step = 0;
        setGuideStage("wallet");
        if (mode === "qr") fetch(resetUrl, { method: "POST" }).catch(() => {});
        render();
        return;
      }
      const wasAccepted = step === flows[mode].length - 1;
      step = wasAccepted ? 0 : step + 1;
      if (wasAccepted) {
        receiptVisible = false;
        saleDebited = false;
        setGuideStage("wallet");
      }
      if (current().accepted) {
        if (getWalletBalance() < sale.amount) {
          paymentRefused = true;
          step = flows[mode].length - 1;
        } else {
          debitWalletForAcceptedSale();
        }
        setGuideStage("receipt");
      }
      if (mode === "qr" && wasAccepted) fetch(resetUrl, { method: "POST" }).catch(() => {});
      render();
    }

    function back() {
      if (paymentRefused) {
        paymentRefused = false;
        step = 0;
        render();
        return;
      }
      step = Math.max(0, step - 1);
      render();
    }

    function setMode(nextMode) {
      mode = nextMode;
      step = 0;
      receiptVisible = false;
      saleDebited = false;
      paymentRefused = false;
      settlementInProgress = false;
      setGuideStage(nextMode === "qr" ? guideStage : "wallet");
      clearTimeout(settlementTimer);
      render();
    }

    function showSettlementThenAccept(accepted) {
      if (settlementInProgress || step >= flows.qr.length - 1) return;
      settlementInProgress = true;
      step = 1;
      render();
      clearTimeout(settlementTimer);
      settlementTimer = setTimeout(() => {
        if (mode !== "qr") return;
        settlementInProgress = false;
        if (!accepted) {
          paymentRefused = true;
          step = flows.qr.length - 1;
        } else {
          step = flows.qr.length - 1;
          debitWalletForAcceptedSale();
        }
        setGuideStage("receipt");
        render();
      }, 3000);
    }

    function render() {
      renderModeButtons();
      renderBasket();
      renderClient();
      renderMerchant();
    }

    document.addEventListener("click", event => {
      const modeButton = event.target.closest("[data-mode]");
      if (modeButton) setMode(modeButton.dataset.mode);
      const action = event.target.closest("[data-action]")?.dataset.action;
      if (action === "scan-guide") {
        if (guideStage === "scan") {
          setGuideStage("continue");
          render();
        }
        return;
      }
      if (action === "next") next();
      if (action === "back") back();
      if (action === "generate-receipt") {
        receiptVisible = !receiptVisible;
        if (receiptVisible && guideStage === "receipt") setGuideStage("done");
        render();
      }
    });

    setInterval(async () => {
      if (mode !== "qr" || step === flows.qr.length - 1) return;
      try {
        const response = await fetch(statusUrl, { cache: "no-store" });
        const data = await response.json();
        if (data.confirmed) {
          showSettlementThenAccept(data.accepted);
        }
      } catch (error) {}
    }, 1200);

    render();

    window.addEventListener("pageshow", render);
  </script>
</body>
</html>
