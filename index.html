<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mockup paiement e-EUR QR ou NFC</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #172033;
      --muted: #667085;
      --line: #d9e2ec;
      --panel: #ffffff;
      --soft: #f4f7fb;
      --brand: #007781;
      --brand-dark: #03515a;
      --blue: #173f8a;
      --ok: #12805c;
      --wait: #a15c07;
      --shadow: 0 22px 60px rgba(13, 35, 58, 0.16);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #08777f, #163f86);
      color: var(--ink);
    }

    button { font: inherit; }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 34px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: end;
      margin-bottom: 18px;
      color: #fff;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 4vw, 48px);
      line-height: 1.04;
      letter-spacing: 0;
    }

    .lede {
      max-width: 760px;
      margin: 10px 0 0;
      color: rgba(255,255,255,.86);
      font-size: 16px;
      line-height: 1.5;
    }

    .mode-switch {
      display: inline-grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      padding: 6px;
      border: 1px solid rgba(255,255,255,.36);
      border-radius: 8px;
      background: rgba(255,255,255,.14);
    }

    .mode-switch button {
      min-height: 40px;
      min-width: 132px;
      padding: 8px 14px;
      border: 0;
      border-radius: 7px;
      background: transparent;
      color: rgba(255,255,255,.82);
      cursor: pointer;
      font-weight: 900;
    }

    .mode-switch button.active {
      background: #fff;
      color: var(--brand-dark);
    }

    .workspace {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      align-items: start;
    }

    .device {
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.28);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .device-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 13px 16px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .screen {
      min-height: 660px;
      padding: 18px;
      background: linear-gradient(#fff, #f8fbfd);
    }

    .label {
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .wallet-card {
      padding: 16px;
      border-radius: 8px;
      background: #102033;
      color: #fff;
    }

    .wallet-card .label { color: rgba(255,255,255,.64); }

    .amount {
      margin: 4px 0 12px;
      color: var(--brand-dark);
      font-size: clamp(40px, 6vw, 58px);
      font-weight: 900;
      letter-spacing: 0;
    }

    .wallet-card .amount { color: #fff; }

    .status {
      display: flex;
      align-items: center;
      min-height: 46px;
      margin: 14px 0;
      padding: 11px 13px;
      border-radius: 8px;
      background: #e8f7f1;
      color: var(--ok);
      font-weight: 900;
    }

    .eu-star-loader {
      position: relative;
      flex: 0 0 auto;
      width: 28px;
      height: 28px;
      margin-right: 10px;
      animation: spinStars 1.4s linear infinite;
    }

    .eu-star-loader span {
      position: absolute;
      left: 50%;
      top: 50%;
      color: #f5c542;
      font-size: 8px;
      line-height: 1;
      transform: rotate(calc(var(--i) * 30deg)) translateY(-11px);
      transform-origin: 0 0;
    }

    @keyframes spinStars {
      to { transform: rotate(360deg); }
    }

    .status.waiting { background: #fff7e6; color: var(--wait); }
    .status.neutral { background: #edf4ff; color: var(--blue); }

    .card {
      margin-top: 12px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .card strong {
      display: block;
      margin-bottom: 5px;
      font-size: 15px;
    }

    .card p {
      margin: 0;
      color: #455468;
      line-height: 1.45;
    }

    .qr-box {
      display: grid;
      place-items: center;
      margin: 14px 0;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .qr-box img {
      display: block;
      width: min(100%, 280px);
      aspect-ratio: 1;
      image-rendering: pixelated;
    }

    .qr-caption {
      margin-top: 9px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-align: center;
    }

    .nfc-visual {
      display: grid;
      place-items: center;
      min-height: 238px;
      margin: 14px 0;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(135deg, #edf8f9, #fff);
      text-align: center;
    }

    .nfc-symbol {
      display: grid;
      place-items: center;
      width: 116px;
      height: 116px;
      margin-bottom: 12px;
      border-radius: 50%;
      background: #102033;
      color: #fff;
      font-size: 34px;
      font-weight: 900;
    }

    .merchant-total {
      padding: 18px;
      border-radius: 8px;
      background: #f5fbfb;
      border: 1px solid #cbe4e7;
    }

    .offline-sync {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      margin-top: 12px;
      padding: 13px 14px;
      border: 1px solid #f1d49b;
      border-radius: 8px;
      background: #fff8ea;
    }

    .offline-sync strong {
      display: block;
      color: #7a4300;
      font-size: 14px;
    }

    .offline-sync span {
      color: #8a5a13;
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .offline-sync em {
      display: block;
      margin-top: 3px;
      color: #946113;
      font-size: 12px;
      font-style: normal;
      font-weight: 700;
    }

    .offline-sync .offline-amount {
      color: #7a4300;
      font-size: 22px;
      font-weight: 950;
      text-align: right;
      white-space: nowrap;
    }

    .ticket {
      display: grid;
      gap: 9px;
      margin-top: 14px;
      padding: 14px;
      border: 1px dashed #9aa8b7;
      border-radius: 8px;
      background: #fff;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      color: #344054;
    }

    .ticket-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .reconciliation {
      display: grid;
      gap: 6px;
      margin-top: 14px;
      padding: 14px;
      border: 1px solid #bfe5d6;
      border-radius: 8px;
      background: #e8f7f1;
      color: #105f46;
      font-weight: 800;
    }

    .reconciliation span {
      color: #2f6f59;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.35;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .primary, .secondary {
      min-height: 46px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 900;
    }

    .primary {
      border: 0;
      background: var(--brand);
      color: #fff;
    }

    .secondary {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--brand-dark);
    }

    @media (max-width: 900px) {
      header, .workspace { grid-template-columns: 1fr; }
      .mode-switch { width: 100%; }
      .mode-switch button { min-width: 0; }
      .screen { min-height: auto; }
      .actions { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Paiement en euro numérique</h1>
        <p class="lede">Deux vues synchronisées : ce que voit le client, et ce que voit le commerçant sur son TPE.</p>
      </div>
      <div class="mode-switch" aria-label="Choix du mode de paiement">
        <button class="active" type="button" data-mode="qr">QR</button>
        <button type="button" data-mode="nfc">NFC</button>
      </div>
    </header>

    <section class="workspace" aria-label="Mockup paiement euro numérique">
      <article class="device" aria-label="Écran client">
        <div class="device-top">
          <span>Client</span>
          <span>App bancaire</span>
        </div>
        <div class="screen" id="clientScreen"></div>
      </article>

      <article class="device" aria-label="Écran commerçant">
        <div class="device-top">
          <span>Commerçant</span>
          <span>TPE</span>
        </div>
        <div class="screen" id="merchantScreen"></div>
      </article>
    </section>
  </main>

  <script>
    const sale = {
      merchant: "Boulangerie Rémi",
      amount: 12.40,
      label: "Formule déjeuner",
      reference: "EEUR-WL-240426-8F3A",
      alias: "MRC-8F3A-214C"
    };

    const offlinePending = {
      count: 3,
      amount: 47.80
    };

    const appOrigin = window.location.origin && window.location.origin !== "null" ? window.location.origin : "http://localhost:8765";
    const saleParams = new URLSearchParams({
      merchant: sale.merchant,
      amount: sale.amount.toFixed(2),
      label: sale.label,
      ref: sale.reference,
      alias: sale.alias
    });
    const paymentLink = `${appOrigin}/wallet-demo.html?${saleParams.toString()}`;
    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&margin=12&data=${encodeURIComponent(paymentLink)}`;
    const statusUrl = `${appOrigin}/status`;
    const resetUrl = `${appOrigin}/reset`;

    const flows = {
      qr: [
        {
          clientStatus: "Scanner le QR affiché par le commerçant",
          merchantStatus: "QR e-EUR affiché",
          clientTitle: "Payer par QR",
          clientText: "Ouvrez le wallet et scannez le QR du TPE.",
          merchantTitle: "Demande de paiement",
          merchantText: "Le QR est prêt pour le client.",
          showQrClient: true,
          showQrMerchant: true,
          rail: "e-EUR / QR / AXIS"
        },
        {
          clientStatus: "Règlement e-EUR en cours",
          merchantStatus: "Validation PSP client / DESP",
          clientTitle: sale.merchant,
          clientText: "Le wallet transmet l'ordre de paiement.",
          merchantTitle: "Routage et règlement",
          merchantText: "AXIS route la demande. Le PSP client transmet l'ordre au DESP.",
          showQrClient: false,
          showQrMerchant: false,
          rail: "e-EUR / QR / AXIS"
        },
        {
          clientStatus: "Paiement accepté",
          merchantStatus: "Accepté - ticket disponible",
          clientTitle: "Ticket wallet",
          clientText: "Boulangerie Rémi - 12,40 €",
          merchantTitle: "Vente validée",
          merchantText: "Le paiement e-EUR est confirmé.",
          showQrClient: false,
          showQrMerchant: false,
          accepted: true,
          rail: "e-EUR / QR / AXIS"
        }
      ],
      nfc: [
        {
          clientStatus: "Approcher le téléphone du TPE",
          merchantStatus: "Présentez le téléphone",
          clientTitle: "Payer par NFC",
          clientText: "Le wallet est prêt pour le paiement e-EUR.",
          merchantTitle: "Montant prêt",
          merchantText: "Le TPE attend le téléphone du client.",
          showNfcClient: true,
          showNfcMerchant: true,
          rail: "e-EUR / NFC / AXIS"
        },
        {
          clientStatus: "Règlement e-EUR en cours",
          merchantStatus: "Validation PSP client / DESP",
          clientTitle: sale.merchant,
          clientText: "Le wallet transmet l'ordre de paiement.",
          merchantTitle: "Routage et règlement",
          merchantText: "AXIS route la demande. Le PSP client transmet l'ordre au DESP.",
          showNfcClient: false,
          showNfcMerchant: false,
          rail: "e-EUR / NFC / AXIS"
        },
        {
          clientStatus: "Paiement accepté",
          merchantStatus: "Accepté - ticket disponible",
          clientTitle: "Ticket wallet",
          clientText: "Boulangerie Rémi - 12,40 €",
          merchantTitle: "Vente validée",
          merchantText: "Le paiement e-EUR est confirmé.",
          showNfcClient: false,
          showNfcMerchant: false,
          accepted: true,
          rail: "e-EUR / NFC / AXIS"
        }
      ]
    };

    let mode = "qr";
    let step = 0;
    let settlementTimer;

    const clientScreen = document.querySelector("#clientScreen");
    const merchantScreen = document.querySelector("#merchantScreen");
    const money = value => value.toLocaleString("fr-FR", { style: "currency", currency: "EUR" });

    function current() {
      return flows[mode][step];
    }

    function statusClass(state) {
      if (state.accepted) return "status";
      if (step === 1) return "status neutral";
      return "status waiting";
    }

    function statusContent(text) {
      if (step !== 1) return text;
      const stars = Array.from({ length: 12 }, (_, index) => `<span style="--i:${index}">★</span>`).join("");
      return `<span class="eu-star-loader" aria-hidden="true">${stars}</span><span>${text}</span>`;
    }

    function paymentVisual(state, side) {
      if ((side === "client" && state.showQrClient) || (side === "merchant" && state.showQrMerchant)) {
        return `
          <div class="qr-box">
            <a href="${paymentLink}" target="_blank" rel="noreferrer"><img src="${qrUrl}" alt="QR code wallet e-EUR" loading="eager"></a>
            <div class="qr-caption">Scannez pour ouvrir le wallet</div>
          </div>
        `;
      }
      if ((side === "client" && state.showNfcClient) || (side === "merchant" && state.showNfcMerchant)) {
        return `
          <div class="nfc-visual" aria-label="Paiement NFC">
            <div class="nfc-symbol">NFC</div>
            <strong>Prêt au sans contact</strong>
          </div>
        `;
      }
      return "";
    }

    function renderClient() {
      const state = current();
      const balance = state.accepted ? 184.60 - sale.amount : 184.60;
      clientScreen.innerHTML = `
        <div class="wallet-card">
          <div class="label">Wallet euro numérique</div>
          <div class="amount">${money(balance)}</div>
          <div>Alias client : CLT-92B7-F31D</div>
        </div>
        <div class="${statusClass(state)}">${statusContent(state.clientStatus)}</div>
        ${paymentVisual(state, "client")}
        <div class="card">
          <strong>${state.clientTitle}</strong>
          <p>${state.clientText}</p>
        </div>
        <div class="actions">
          <button class="secondary" type="button" data-action="back">Retour</button>
          <button class="primary" type="button" data-action="next">${state.accepted ? "Nouvelle vente" : "Continuer"}</button>
        </div>
      `;
    }

    function renderMerchant() {
      const state = current();
      merchantScreen.innerHTML = `
        <div class="merchant-total">
          <div class="label">Montant</div>
          <div class="amount">${money(sale.amount)}</div>
          <strong>${sale.label}</strong>
        </div>
        <div class="offline-sync" aria-label="Ventes offline en attente de synchronisation">
          <div>
            <span>Ventes offline en attente</span>
            <strong>${offlinePending.count} ventes à synchroniser</strong>
            <em>${state.accepted ? "Synchronisation DESP terminée" : "En attente de reconnexion réseau"}</em>
          </div>
          <div class="offline-amount">${money(offlinePending.amount)}</div>
        </div>
        <div class="${statusClass(state)}">${statusContent(state.merchantStatus)}</div>
        ${paymentVisual(state, "merchant")}
        <div class="card">
          <strong>${state.merchantTitle}</strong>
          <p>${state.merchantText}</p>
        </div>
        <div class="ticket" aria-label="Ticket commerçant">
          <div class="ticket-row"><span>Marchand</span><strong>${sale.merchant}</strong></div>
          <div class="ticket-row"><span>Montant</span><strong>${money(sale.amount)}</strong></div>
          <div class="ticket-row"><span>Rail</span><strong>${state.rail}</strong></div>
          <div class="ticket-row"><span>Statut</span><strong>${state.accepted ? "ACCEPTÉ" : "EN COURS"}</strong></div>
          <div class="ticket-row"><span>Ref.</span><strong>${sale.reference}</strong></div>
        </div>
        ${state.accepted ? `
          <div class="reconciliation" aria-label="Réconciliation commerçant">
            Réconciliation terminée
            <span>Vente rapprochée avec le règlement e-EUR. Reporting commerçant prêt.</span>
          </div>
        ` : ""}
        <div class="actions">
          <button class="secondary" type="button" data-action="back">Retour</button>
          <button class="primary" type="button" data-action="next">${state.accepted ? "Nouvelle vente" : "Continuer"}</button>
        </div>
      `;
    }

    function renderModeButtons() {
      document.querySelectorAll("[data-mode]").forEach(button => {
        button.classList.toggle("active", button.dataset.mode === mode);
      });
    }

    function next() {
      const wasAccepted = step === flows[mode].length - 1;
      step = wasAccepted ? 0 : step + 1;
      if (mode === "qr" && wasAccepted) fetch(resetUrl, { method: "POST" }).catch(() => {});
      render();
    }

    function back() {
      step = Math.max(0, step - 1);
      render();
    }

    function setMode(nextMode) {
      mode = nextMode;
      step = 0;
      clearTimeout(settlementTimer);
      render();
    }

    function showSettlementThenAccept() {
      if (step >= flows.qr.length - 1) return;
      step = 1;
      render();
      clearTimeout(settlementTimer);
      settlementTimer = setTimeout(() => {
        if (mode !== "qr") return;
        step = flows.qr.length - 1;
        render();
      }, 1400);
    }

    function render() {
      renderModeButtons();
      renderClient();
      renderMerchant();
    }

    document.addEventListener("click", event => {
      const modeButton = event.target.closest("[data-mode]");
      if (modeButton) setMode(modeButton.dataset.mode);
      const action = event.target.closest("[data-action]")?.dataset.action;
      if (action === "next") next();
      if (action === "back") back();
    });

    setInterval(async () => {
      if (mode !== "qr" || step === flows.qr.length - 1) return;
      try {
        const response = await fetch(statusUrl, { cache: "no-store" });
        const data = await response.json();
        if (data.confirmed) {
          showSettlementThenAccept();
        }
      } catch (error) {}
    }, 1200);

    render();
  </script>
</body>
</html>
