<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mockup euro numérique</title>
  <meta property="og:title" content="Mockup euro numérique">
  <meta name="twitter:title" content="Mockup euro numérique">
  <style>
    :root { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #172033; background: #f4f7fb; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 18px; background: linear-gradient(135deg, #08777f, #163f86); }
    main { width: min(430px, 100%); border-radius: 14px; overflow: hidden; background: #fff; box-shadow: 0 24px 70px rgba(10, 30, 50, .25); }
    header { padding: 18px; background: #102033; color: #fff; }
    .label { margin-bottom: 6px; color: #718096; font-size: 12px; font-weight: 900; letter-spacing: .08em; text-transform: uppercase; }
    header .label { color: rgba(255,255,255,.65); }
    .project-kicker { width: fit-content; margin-bottom: 8px; padding: 4px 7px; border: 1px solid rgba(255,255,255,.24); border-radius: 6px; color: rgba(255,255,255,.72); font-size: 11px; font-weight: 800; letter-spacing: 0; }
    h1 { margin: 0; font-size: 22px; letter-spacing: 0; }
    section { padding: 18px; }
    .amount { margin: 8px 0 14px; color: #03515a; font-size: 54px; font-weight: 950; letter-spacing: 0; }
    .card { margin-top: 12px; padding: 14px; border: 1px solid #d9e2ec; border-radius: 10px; background: #fff; }
    .row { display: flex; justify-content: space-between; gap: 12px; padding: 8px 0; border-bottom: 1px solid #edf2f7; }
    .row:last-child { border-bottom: 0; }
    .row span { color: #667085; }
    .row strong { text-align: right; }
    button { width: 100%; min-height: 52px; margin-top: 16px; border: 0; border-radius: 10px; background: #007781; color: #fff; cursor: pointer; font: inherit; font-weight: 900; }
    button:disabled { background: #12805c; cursor: default; }
    .status { display: none; margin-top: 14px; padding: 12px; border-radius: 10px; background: #e8f7f1; color: #12805c; font-weight: 900; text-align: center; }
    .status.show { display: block; }
    .status.pending { background: #edf4ff; color: #173f8a; }
    .wallet-loader {
      position: relative;
      width: 78px;
      height: 78px;
      margin: 18px auto 10px;
      animation: spinStars 1.4s linear infinite;
    }
    .wallet-loader span {
      position: absolute;
      left: 50%;
      top: 50%;
      color: #f5c542;
      font-size: 16px;
      line-height: 1;
      transform: rotate(calc(var(--i) * 30deg)) translateY(-32px);
      transform-origin: 0 0;
    }
    @keyframes spinStars { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="project-kicker">Projet PIE 2026 - EM Grenoble</div>
      <div class="label">Wallet euro numérique</div>
      <h1>Confirmer le paiement</h1>
    </header>
    <section>
      <div class="label">Montant</div>
      <div class="amount" id="amount">12,40 €</div>
      <div class="card">
        <div class="row"><span>Marchand</span><strong id="merchant">Boulangerie Rémi</strong></div>
        <div class="row"><span>Achat</span><strong id="label">Formule déjeuner</strong></div>
        <div class="row"><span>Référence</span><strong id="ref">EEUR-WL-240426-8F3A</strong></div>
        <div class="row"><span>Alias marchand</span><strong id="alias">MRC-8F3A-214C</strong></div>
      </div>
      <button id="confirm" type="button">Confirmer</button>
      <div class="status" id="status">Paiement accepté</div>
    </section>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    const merchant = params.get('merchant') || 'Boulangerie Rémi';
    const amount = Number(params.get('amount') || '12.40');
    const label = params.get('label') || 'Formule déjeuner';
    const ref = params.get('ref') || 'EEUR-WL-240426-8F3A';
    const alias = params.get('alias') || 'MRC-8F3A-214C';
    const money = value => value.toLocaleString('fr-FR', { style: 'currency', currency: 'EUR' });
    document.querySelector('#merchant').textContent = merchant;
    document.querySelector('#amount').textContent = money(amount);
    document.querySelector('#label').textContent = label;
    document.querySelector('#ref').textContent = ref;
    document.querySelector('#alias').textContent = alias;
    document.querySelector('#confirm').addEventListener('click', async () => {
      const button = document.querySelector('#confirm');
      const status = document.querySelector('#status');
      const stars = Array.from({ length: 12 }, (_, index) => `<span style="--i:${index}">★</span>`).join("");
      button.textContent = 'Règlement en cours';
      button.disabled = true;
      status.innerHTML = `<div class="wallet-loader" aria-hidden="true">${stars}</div>Validation PSP client / DESP`;
      status.className = 'status show pending';
      await fetch('/confirm', { method: 'POST' }).catch(() => {});
      setTimeout(() => {
        button.textContent = 'Confirmé';
        status.textContent = 'Paiement accepté';
        status.className = 'status show';
      }, 2600);
    });
  </script>
</body>
</html>
